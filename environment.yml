name: netmedpy_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - setuptools>=61
  - wheel

  # Core dependencies (from pyproject.toml)
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - networkx

  # Interactive stack (your optional dependencies, now default)
  - jupyterlab
  - notebook
  - ipython
  - ipykernel

  # Optional but useful for scientific workflows
  - tqdm